<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Out</title>

  <!-- Google Fonts: Newsreader (for headings/numbers) + DM Sans (for body text) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

  <!-- ================================================================
       HEADER — greeting on the left
       ================================================================ -->
  <header>
    <div class="header-left">
      <!-- "Good afternoon" — written by getGreeting() in app.js -->
      <h1 id="greeting"></h1>
      <!-- "Friday, April 4, 2026" — written by getDateDisplay() in app.js -->
      <div class="date" id="dateDisplay"></div>
    </div>
  </header>

  <!-- ================================================================
       QUICK LINKS — favorite sites navigation bar at the very top
       Click a tile to open the site; click + to add a new one.
       Hover a tile to reveal the × delete button.
       ================================================================ -->
  <section class="top-section quick-links-section">
    <div class="section-header">
      <h2>Quick links</h2>
      <div class="section-line"></div>
      <div class="section-count" id="quickLinksCount"></div>
    </div>
    <nav class="quick-links" id="quickLinks">
      <div class="quick-links-list" id="quickLinksList"></div>
    </nav>
  </section>

  <!-- ================================================================
       WORKSPACES — save the current set of open tabs as a workspace
       and reopen them all later with one click.
       ================================================================ -->
  <section class="top-section workspaces-section">
    <div class="section-header">
      <h2>Workspaces</h2>
      <div class="section-line"></div>
      <div class="section-count" id="workspacesCount"></div>
    </div>
    <div class="workspaces" id="workspaces">
      <div class="workspaces-list" id="workspacesList"></div>
      <button class="workspace-add" data-action="open-workspace-modal" title="Save current tabs as a workspace">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
        </svg>
        <span class="workspace-add-label">Save current tabs</span>
      </button>
    </div>
  </section>

  <!-- ================================================================
       TAB OUT DUPES BANNER — appears when you have extra Tab Out tabs open
       Hidden by default; app.js shows it when dupeTabOutCount > 1
       ================================================================ -->
  <div class="tab-cleanup-banner" id="tabOutDupeBanner" style="display:none">
    <div class="tab-cleanup-left">
      <div class="tab-cleanup-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 0 1-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 0 1 1.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 0 0-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 0 1-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 0 0-3.375-3.375h-1.5a1.125 1.125 0 0 1-1.125-1.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H9.75" />
        </svg>
      </div>
      <div class="tab-cleanup-text">
        You have <strong id="tabOutDupeCount"></strong> Tab Out tabs open. Keep just this one?
      </div>
    </div>
    <button class="tab-cleanup-btn" data-action="close-tabout-dupes">Close extras</button>
  </div>

  <!-- ================================================================
       MAIN CONTENT AREA — two-column layout
       Left: open tabs (domain/mission cards)
       Right: saved for later checklist
       The right column only renders when it has items (JS controls this)
       ================================================================ -->
  <div class="dashboard-columns" id="dashboardColumns">

    <!-- LEFT COLUMN: Open tabs -->
    <div class="active-section" id="openTabsSection" style="display:none">
      <div class="section-header">
        <h2 id="openTabsSectionTitle">Right now</h2>
        <div class="section-line"></div>
        <div class="section-count" id="openTabsSectionCount"></div>
      </div>
      <div class="missions" id="openTabsMissions"></div>
    </div>

    <!-- RIGHT COLUMN: Saved for Later checklist -->
    <div class="deferred-column" id="deferredColumn" style="display:none">
      <div class="section-header">
        <h2>Saved for later</h2>
        <div class="section-line"></div>
        <div class="section-count" id="deferredCount"></div>
      </div>

      <!-- Active checklist items — injected by renderDeferredList() in app.js -->
      <div class="deferred-list" id="deferredList"></div>

      <!-- Empty state — shown when no active deferred tabs -->
      <div class="deferred-empty" id="deferredEmpty" style="display:none">
        Nothing saved. Living in the moment.
      </div>

      <!-- Archive section — collapsed by default -->
      <div class="deferred-archive" id="deferredArchive" style="display:none">
        <button class="archive-toggle" id="archiveToggle">
          <svg class="archive-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" /></svg>
          Archive
          <span class="archive-count" id="archiveCount"></span>
        </button>
        <div class="archive-body" id="archiveBody" style="display:none">
          <input type="text" class="archive-search" id="archiveSearch" placeholder="Search archived tabs...">
          <div class="archive-list" id="archiveList"></div>
        </div>
      </div>
    </div>

  </div><!-- end .dashboard-columns -->

  <!-- ================================================================
       FOOTER — global stats + refresh control
       ================================================================ -->
  <footer>
    <div class="footer-stats">
      <div class="stat">
        <div class="stat-num" id="statTabs">—</div>
        <div class="stat-label">Open tabs</div>
      </div>
    </div>
    <div class="last-refresh">
      <span style="color: var(--muted); font-size: 11px;"><a href="https://github.com/zarazhangrui/tab-out" target="_top" style="color: var(--muted); text-decoration: underline; text-underline-offset: 2px;">Tab Out</a> by <a href="https://x.com/zarazhangrui" target="_top" style="color: var(--muted); text-decoration: underline; text-underline-offset: 2px;">Zara</a></span>
    </div>
  </footer>

</div><!-- end .container -->

<!-- ================================================================
     QUICK LINK MODAL — appears when user clicks the + tile
     ================================================================ -->
<div class="quick-link-modal" id="quickLinkModal" style="display:none" data-action="close-quick-link-modal">
  <div class="quick-link-modal-card" data-modal-stop>
    <div class="quick-link-modal-title" id="quickLinkModalTitle">Add a site</div>
    <label class="quick-link-modal-label">URL</label>
    <input type="text" id="quickLinkUrlInput" class="quick-link-modal-input" placeholder="https://example.com" autocomplete="off" spellcheck="false">
    <label class="quick-link-modal-label">Name (optional)</label>
    <input type="text" id="quickLinkNameInput" class="quick-link-modal-input" placeholder="Shown under the icon" autocomplete="off" spellcheck="false">
    <div class="quick-link-modal-error" id="quickLinkModalError" style="display:none"></div>
    <div class="quick-link-modal-actions">
      <button class="quick-link-modal-btn quick-link-modal-btn-ghost" data-action="close-quick-link-modal">Cancel</button>
      <button class="quick-link-modal-btn quick-link-modal-btn-primary" id="quickLinkModalSaveBtn" data-action="save-quick-link">Add</button>
    </div>
  </div>
</div>

<!-- ================================================================
     QUICK LINK CONTEXT MENU — appears on right-click of a tile
     ================================================================ -->
<div class="quick-link-context-menu" id="quickLinkContextMenu" style="display:none">
  <button class="quick-link-context-item" data-action="edit-quick-link">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L6.832 19.82a4.5 4.5 0 0 1-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 0 1 1.13-1.897L16.863 4.487zm0 0L19.5 7.125" />
    </svg>
    Edit
  </button>
  <button class="quick-link-context-item quick-link-context-item-danger" data-action="delete-quick-link">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
    </svg>
    Delete
  </button>
</div>

<!-- ================================================================
     WORKSPACE MODAL — name the workspace before saving
     ================================================================ -->
<div class="quick-link-modal" id="workspaceModal" style="display:none" data-action="close-workspace-modal">
  <div class="quick-link-modal-card" data-modal-stop>
    <div class="quick-link-modal-title">Save current tabs</div>
    <div class="quick-link-modal-subtitle" id="workspaceModalSubtitle"></div>
    <label class="quick-link-modal-label">Workspace name</label>
    <input type="text" id="workspaceNameInput" class="quick-link-modal-input" placeholder="e.g. Research, Trip planning" autocomplete="off" spellcheck="false">
    <div class="quick-link-modal-error" id="workspaceModalError" style="display:none"></div>
    <div class="quick-link-modal-actions">
      <button class="quick-link-modal-btn quick-link-modal-btn-ghost" data-action="close-workspace-modal">Cancel</button>
      <button class="quick-link-modal-btn quick-link-modal-btn-primary" data-action="save-workspace">Save</button>
    </div>
  </div>
</div>

<!-- ================================================================
     TOAST — floats above everything, used for action confirmations
     Hidden by default via CSS (opacity:0, translateY)
     ================================================================ -->
<div class="toast" id="toast">
  <!-- Checkmark circle icon (Heroicons outline) -->
  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
  </svg>
  <span id="toastText"></span>
</div>

<!-- Personal config (gitignored) — defines LOCAL_LANDING_PAGE_PATTERNS etc. -->
<!-- If the file doesn't exist, that's fine — app.js uses sensible defaults. -->
<script src="config.local.js" onerror="/* no personal config, that's fine */"></script>

<!-- Main dashboard logic — loads last so the DOM is ready -->
<script src="app.js"></script>
</body>
</html>
